# Nginx config for hexos.kadangkesel.net
# Place at: /etc/nginx/sites-available/hexos.kadangkesel.net
# Enable:   ln -s /etc/nginx/sites-available/hexos.kadangkesel.net /etc/nginx/sites-enabled/
# SSL:      certbot --nginx -d hexos.kadangkesel.net
#
# Directory structure on VPS:
#   /var/www/hexos/
#     install.sh        ← copy from repo install.sh
#     install.ps1       ← copy from repo install.ps1
#     version           ← plain text file with current version (e.g. "0.1.0")
#     index.html        ← landing page (optional)

server {
    listen 80;
    listen [::]:80;
    server_name hexos.kadangkesel.net;

    # Certbot will add SSL redirect here
    # After running: certbot --nginx -d hexos.kadangkesel.net

    root /var/www/hexos;
    index index.html;

    # --- Installer scripts ---

    # curl -fsSL https://hexos.kadangkesel.net/install | bash
    location = /install {
        default_type text/plain;
        alias /var/www/hexos/install.sh;
    }

    # irm https://hexos.kadangkesel.net/install.ps1 | iex
    location = /install.ps1 {
        default_type text/plain;
        alias /var/www/hexos/install.ps1;
    }

    # --- Version endpoint ---
    # Returns plain text version number (e.g. "0.1.0")
    location = /version {
        default_type text/plain;
        alias /var/www/hexos/version;
    }

    # --- Download proxy to GitHub Releases ---
    # /download/v0.1.0/hexos-0.1.0-linux-amd64.tar.gz
    # → https://github.com/kadangkesel/hexos/releases/download/v0.1.0/hexos-0.1.0-linux-amd64.tar.gz
    location /download/ {
        # Rewrite to GitHub Releases URL
        rewrite ^/download/(.*)$ https://github.com/kadangkesel/hexos/releases/download/$1 redirect;
    }

    # --- Landing page ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
